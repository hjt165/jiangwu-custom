name: Loop Monitor

on:
  repository_dispatch:
    types: [ci-complete]
  workflow_dispatch:
    inputs:
      iteration:
        description: '当前迭代次数'
        default: '1'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  analyze:
    name: Analyze Test Failures
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'repository_dispatch' && github.event.client-payload.has_failure == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download CI Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-test-results"
          path: ci-reports/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Monitor
        id: monitor
        run: |
          python scripts/loop-monitor.py \
            --report-dir ci-reports/ \
            --output .github/TODO.md \
            --memory .github/LOOP_MEMORY.md \
            --iteration ${{ github.event.inputs.iteration || '1' }}

      - name: Upload TODO
        uses: actions/upload-artifact@v4
        with:
          name: loop-todo
          path: .github/TODO.md

      - name: Trigger Auto-Fix
        if: steps.monitor.outputs.has_fixable == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: monitor-complete
          client-payload: |
            {
              "fixable_count": "${{ steps.monitor.outputs.fixable_count }}",
              "iteration": "${{ github.event.inputs.iteration || '1' }}",
              "commit_sha": "${{ github.sha }}"
            }

      - name: Comment on PR
        if: steps.monitor.outputs.total_failures != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const failures = '${{ steps.monitor.outputs.total_failures }}';
            const fixable = '${{ steps.monitor.outputs.fixable_count }}';
            const iteration = '${{ github.event.inputs.iteration || '1' }}';

            const body = `## Loop Engineering Monitor Report

            | Metric | Value |
            |--------|-------|
            | Iteration | ${iteration} |
            | Total Failures | ${failures} |
            | Auto-fixable | ${fixable} |

            ${parseInt(fixable) > 0 ? 'Auto-fix workflow has been triggered.' : 'No auto-fixable issues found.'}

            > Generated by Loop Engineering Monitor`;

            // Find open PR for this branch
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: body,
              });
            }
