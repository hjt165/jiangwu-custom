# ===========================================
# 匠物定制 - Docker Compose 编排
# 使用: docker compose up -d
# ===========================================

services:

  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: jiangwu-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jiangwu_custom}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jiangwu-net

  redis:
    image: redis:7-alpine
    container_name: jiangwu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jiangwu-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: jiangwu-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - jiangwu-net

  # ==================== Milvus 向量数据库 ====================

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: jiangwu-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jiangwu-net

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: jiangwu-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jiangwu-net

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: jiangwu-milvus
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - jiangwu-net

  # ==================== 应用服务 ====================

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jiangwu-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      JWT_SECRET: ${JWT_SECRET:-jiangwu-custom-secret-key-must-be-at-least-256-bits-long-for-hs256}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - jiangwu-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: jiangwu-ai-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      ENABLE_REAL_LLM: ${ENABLE_REAL_LLM:-false}
      QWEN_API_KEY: ${QWEN_API_KEY:-mock-api-key}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      SPRING_BOOT_URL: http://server:8080
      TZ: Asia/Shanghai
    depends_on:
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/api/ai/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - jiangwu-net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: jiangwu-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - jiangwu-net

# ==================== 网络 ====================
networks:
  jiangwu-net:
    driver: bridge

# ==================== 持久化卷 ====================
volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  etcd-data:
  minio-data:
  milvus-data:
