# ===========================================
# 匠物定制 - 生产环境配置
# 启动参数: java -jar app.jar --spring.profiles.active=prod
# ===========================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: prod
  application:
    name: jiangwu-server
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.jiangwu: warn
    org.springframework: warn

# 支付配置（生产环境需关闭Mock）
payment:
  mock-enabled: false
  wechat:
    app-id: ${WECHAT_APP_ID}
    partner-id: ${WECHAT_PARTNER_ID}
    api-key: ${WECHAT_API_KEY}

# 区块链配置（生产环境需关闭Mock）
blockchain:
  mock-enabled: false
