server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: jiangwu-server
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Logging
logging:
  level:
    com.jiangwu: debug
    org.springframework: info

# 支付配置（Mock模式）
payment:
  mock-enabled: true
  wechat:
    app-id: wx_test_app_id
    partner-id: wx_test_partner_id
    api-key: wx_test_api_key

# 区块链配置（Mock模式）
blockchain:
  mock-enabled: true
