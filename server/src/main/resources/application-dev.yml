# MySQL
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jiangwu_custom?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# JWT
jwt:
  secret: jiangwu-custom-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24小时

# AI Service
ai:
  service:
    base-url: http://localhost:8001/api/ai
    timeout: 30000
    connect-timeout: 5000

# Flowable
flowable:
  database-schema-update: true
  async-executor-activate: false
