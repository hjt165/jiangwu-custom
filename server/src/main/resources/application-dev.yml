# MySQL
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jiangwu_custom?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: jiangwu-dev-redis-pwd
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: jiangwu-dev
    password: jiangwu-dev-mq-pwd
    virtual-host: /

# JWT
# JWT - prod 环境务必通过 JWT_SECRET 环境变量注入，不要硬编码
jwt:
  secret: ${JWT_SECRET:jiangwu-dev-secret-key-2024-change-in-prod-min-256-bits-long-for-hs256}
  expiration: 86400000  # 24小时

# AI Service
ai:
  service:
    base-url: http://localhost:8001/api/ai
    timeout: 30000
    connect-timeout: 5000

# MyBatis-Plus SQL日志（仅dev环境开启）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 支付配置（Mock模式）
payment:
  mock-enabled: true
  wechat:
    app-id: wx_test_app_id
    partner-id: wx_test_partner_id
    api-key: wx_test_api_key

# CORS 允许的域名（逗号分隔）
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:8080,http://localhost:8082

# Flowable
flowable:
  database-schema-update: true
  async-executor-activate: false
  check-process-definitions: true
  deploy-enabled: true
