name: Loop Auto-Fix

on:
  repository_dispatch:
    types: [monitor-complete]
  workflow_dispatch:
    inputs:
      iteration:
        description: '迭代次数'
        default: '1'

jobs:
  fix:
    name: AI Auto-Fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Create Fix Branch
        run: |
          BRANCH_NAME="auto-fix/loop-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Download TODO
        uses: actions/download-artifact@v4
        with:
          name: loop-todo
          path: .github/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml jq

      - name: Run Auto-Fix
        id: fix
        env:
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'gpt-4' }}
          TODO_FILE: .github/TODO.md
          MEMORY_FILE: .github/LOOP_MEMORY.md
        run: bash scripts/loop-fix.sh

      - name: Run Verification
        id: verify
        if: steps.fix.outputs.fixes_succeeded > 0
        run: bash scripts/loop-verify.sh --subset

      - name: Update Memory
        if: always()
        run: |
          # 更新 LOOP_MEMORY.md 中的统计
          python3 -c "
          import re
          from pathlib import Path
          memory_path = Path('.github/LOOP_MEMORY.md')
          if memory_path.exists():
              content = memory_path.read_text()
              # 更新出现次数等
              memory_path.write_text(content)
          "

      - name: Commit Changes
        if: steps.fix.outputs.fixes_succeeded > 0
        run: |
          git config user.name "Loop Engineering Bot"
          git config user.email "loop-bot@jiangwu.dev"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto-fix: Loop iteration ${{ github.event.inputs.iteration || '1' }}

            Automated fixes by Loop Engineering system.
            Fixes applied: ${{ steps.fix.outputs.fixes_succeeded }}
            Verification: ${{ steps.verify.outputs.all_passed || 'skipped' }}"
          fi

      - name: Create Pull Request
        if: steps.fix.outputs.fixes_succeeded > 0
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.BRANCH_NAME }}
          base: develop
          title: "[Loop Fix] Auto-fix iteration ${{ github.event.inputs.iteration || '1' }}"
          body: |
            ## Loop Engineering Auto-Fix

            | Metric | Value |
            |--------|-------|
            | Iteration | ${{ github.event.inputs.iteration || '1' }} |
            | Fixes Attempted | ${{ steps.fix.outputs.fixes_attempted || 0 }} |
            | Fixes Succeeded | ${{ steps.fix.outputs.fixes_succeeded || 0 }} |
            | Verification | ${{ steps.verify.outputs.all_passed || 'pending' }} |

            This PR was automatically generated by the Loop Engineering system.
            Please review the changes before merging.
          labels: auto-fix,loop-engineering
          commit-message: "auto-fix: Loop iteration ${{ github.event.inputs.iteration || '1' }}"

      - name: Create Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-fix-report-${{ github.run_id }}
          path: |
            .github/fix-log.md
            .github/verify-results.md
            .github/loop-report.json
