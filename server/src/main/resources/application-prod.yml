# ===========================================
# 匠物定制 - 生产环境配置
# 启动参数: java -jar app.jar --spring.profiles.active=prod
# ===========================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: prod
  application:
    name: jiangwu-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jiangwu_custom}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: true
  data:
    redis:
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      mode: never

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://jiangwu.com}

# 支付配置（生产环境需关闭Mock）
payment:
  mock-enabled: false
  wechat:
    app-id: ${WECHAT_APP_ID}
    partner-id: ${WECHAT_PARTNER_ID}
    api-key: ${WECHAT_API_KEY}

# 区块链配置（生产环境需关闭Mock）
blockchain:
  mock-enabled: false
