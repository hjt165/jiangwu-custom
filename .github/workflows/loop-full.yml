name: Loop Full Autonomy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      max_iterations:
        description: '最大迭代次数'
        default: '3'
      local_mode:
        description: '本地模式 (true/false)'
        default: 'false'

jobs:
  loop:
    name: Loop Engineering Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          pip install pyyaml
          cd server && mvn dependency:resolve -q
          cd ../jiangwu_custom && flutter pub get
          cd ../admin && npm ci

      - name: Run Loop Orchestrator
        id: loop
        env:
          MAX_ITERATIONS: ${{ github.event.inputs.max_iterations || '3' }}
          LOCAL_MODE: ${{ github.event.inputs.local_mode || 'false' }}
        run: |
          python scripts/loop-orchestrator.py \
            --config .github/loop-config.yml \
            ${{ github.event.inputs.local_mode == 'true' && '--local' || '' }}

      - name: Upload Final Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-final-report
          path: |
            .github/loop-report.json
            .github/TODO.md
            .github/verify-results.md
            .github/fix-log.md

      - name: Generate Summary
        if: always()
        run: |
          if [ -f .github/loop-report.json ]; then
            echo "## Loop Engineering Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat .github/loop-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f\"| Metric | Value |\")
          print(f\"|--------|-------|\")
          print(f\"| Iterations | {data.get('total_iterations', 'N/A')} |\")
          print(f\"| Final State | {data.get('final_state', 'N/A')} |\")
          print(f\"| Fixes Attempted | {data.get('total_fixes_attempted', 0)} |\")
          print(f\"| Fixes Succeeded | {data.get('total_fixes_succeeded', 0)} |\")
          print(f\"| Success Rate | {data.get('success_rate', 'N/A')} |\")
          print(f\"| Duration | {data.get('duration_human', 'N/A')} |\")
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on Failure
        if: failure() || steps.loop.outputs.final_state == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Loop Engineering: Auto-fix failed after max iterations',
              body: `The Loop Engineering system failed to resolve all issues after ${{ github.event.inputs.max_iterations || 3 }} iterations.\n\nPlease review the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['bug', 'loop-engineering'],
            });
